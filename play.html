<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Emoji Bible Guess</title>

<style>
body {
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#2b5876,#4e4376);
color:white;
height:100vh;
overflow:hidden;
}

#app {
max-width:500px;
margin:auto;
height:100vh;
display:flex;
flex-direction:column;
padding:20px;
}

.screen { display:none; flex-direction:column; height:100%; }
.show { display:flex; }

h1 { text-align:center; margin-top:40px; }

.card {
background:white;
color:black;
padding:25px;
border-radius:20px;
margin-top:20px;
text-align:center;
}

button {
padding:18px;
border:none;
border-radius:15px;
font-size:20px;
margin-top:15px;
font-weight:bold;
}

.primary { background:#00c853; color:white; }
.secondary { background:#ffca28; }
.blue { background:#2196f3; color:white; }

.info {
display:flex;
justify-content:space-between;
font-size:28px;
margin-top:10px;
}

#emoji {
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:80px;
text-align:center;
}

.footer {
display:flex;
gap:10px;
margin-bottom:20px;
}

.footer button { flex:1; }

table { width:100%; margin-top:20px; }
td { padding:10px; font-size:20px; }
</style>
</head>

<body>
<div id="app">

<!-- START -->
<div id="start" class="screen show">
<h1>📖 Emoji Bible Guess</h1>

<div class="card">
<h2>Select Teams</h2>

<select id="teams">
<option value="2">2 Teams</option>
<option value="3">3 Teams</option>
<option value="4">4 Teams</option>
<option value="5">5 Teams</option>
</select>

<button class="primary" onclick="startGame()">Start Game</button>
</div>
</div>

<!-- GAME -->
<div id="game" class="screen">

<div class="info">
<div>⏱ <span id="time">60</span></div>
<div>⭐ <span id="score">0</span></div>
<div>🏆 T<span id="team">1</span></div>
</div>

<div id="emoji">👑👶🗡️</div>

<div class="footer">
<button class="primary" onclick="correct()">✓ Correct</button>
<button class="secondary" onclick="skip()">⏭ Skip</button>
</div>

</div>

<!-- BETWEEN TEAMS -->
<div id="between" class="screen">
<h1>Team <span id="nextTeam">2</span></h1>

<div class="card">
<h2>Pass the phone 📱</h2>
<button class="blue" onclick="nextTeam()">Start</button>
</div>
</div>

<!-- END -->
<div id="end" class="screen">
<h1>🏆 Game Over</h1>

<div class="card">
<h2 id="winner"></h2>
<table id="results"></table>
<button class="primary" onclick="location.reload()">Play Again</button>
</div>
</div>

</div>

<script>

const cards = [
{e:"👑👶🗡️", a:"Solomon"},
{e:"👶🧺🐊", a:"Moses"},
{e:"🦁🙏", a:"Daniel"},
{e:"🌊🐋🙏", a:"Jonah"},
{e:"🔥🐂🐦‍⬛🍞", a:"Elijah"},
{e:"👸✡️📜💍", a:"Esther"},
{e:"🪽🤱🏻🌠🐑", a:"Jesus"},
{e:"🕎", a:"Hanukkah"},
{e:"🌿🩸🐑🚪", a:"Passover"},

// funny ones
{e:"🌱✅", a:"Ruth"},
{e:"🚫🅰️", a:"Noah"},
{e:"🗣️❌", a:"Daniel"},
{e:"⏪", a:"Esther"},
{e:"🤵🏻👰🏻‍♀️", a:"Mary"},
{e:"💎💰", a:"Lazarus"},
{e:"🐍S", a:"Boaz"},
{e:"📊", a:"Paul"}
];

let teamCount = 2;
let team = 1;
let score = 0;
let time = 60;
let timer;
let used = [];
let scores = [];

function startGame(){
teamCount = parseInt(document.getElementById("teams").value);
scores = Array(teamCount).fill(0);

document.getElementById("start").classList.remove("show");
document.getElementById("game").classList.add("show");

startRound();
}

function startRound(){
time = 60;
score = 0;
used = [];

document.getElementById("team").innerText = team;

nextCard();

timer = setInterval(()=>{
time--;
document.getElementById("time").innerText = time;

if(time <= 0){
endRound();
}
},1000);
}

function nextCard(){
if(used.length === cards.length) used = [];

let i;
do {
i = Math.floor(Math.random() * cards.length);
} while(used.includes(i));

used.push(i);

document.getElementById("emoji").innerText = cards[i].e;
document.currentAnswer = cards[i].a;
}

function correct(){
score++;
scores[team-1] = score;
document.getElementById("score").innerText = score;
nextCard();
}

function skip(){
nextCard();
}

function endRound(){
clearInterval(timer);

document.getElementById("game").classList.remove("show");

if(team < teamCount){
team++;
document.getElementById("nextTeam").innerText = team;
document.getElementById("between").classList.add("show");
} else {
showResults();
}
}

function nextTeam(){
document.getElementById("between").classList.remove("show");
document.getElementById("game").classList.add("show");
startRound();
}

function showResults(){
document.getElementById("end").classList.add("show");

let table = "";
let max = 0;
let winner = 1;

scores.forEach((s,i)=>{
if(s > max){
max = s;
winner = i+1;
}
table += `<tr><td>Team ${i+1}</td><td>${s}</td></tr>`;
});

document.getElementById("results").innerHTML = table;
document.getElementById("winner").innerText = "Team " + winner + " Wins 🎉";
}

</script>

</body>
</html>
