<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Emoji Bible Guess</title>

<style>
* { -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #2b5876, #4e4376);
  color: white;
  height: 100vh;
  height: 100dvh; 
  overflow: hidden;
  box-sizing: border-box;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior-y: none;
}

#app {
  max-width: 500px;
  margin: auto;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: calc(16px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)); 
  padding-left: calc(20px + env(safe-area-inset-left));
  padding-right: calc(20px + env(safe-area-inset-right));
  box-sizing: border-box;
}

.screen { 
  display: none; 
  flex-direction: column; 
  height: 100%; 
  justify-content: space-between; 
}
.show { display: flex; }

h1 { 
  text-align: center; 
  margin-top: 15px; 
  margin-bottom: 10px;
  font-size: 28px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  box-sizing: border-box;
}

#start {
  justify-content: center;
}
#start .card {
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 15px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 44px;
  touch-action: manipulation;
}

.primary { background: #00c853; color: white; }
.secondary { background: #ffca28; color: black; }
.blue { background: #2196f3; color: white; }
.red { background: #e53935; color: white; }

/* TOP HEADER INFO BAR */
.info {
  display: flex;
  justify-content: space-between;
  font-size: 26px;
  font-weight: bold;
  padding-top: 10px;
}

/* CENTERED PLAY AREA */
.game-center-container {
  flex: 1;
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 55px;
  font-weight: bold;
  text-align: center;
  min-height: 0;
}

#emoji {
  display: inline-block;
}

#hint {
  display: block;
  width: 100%;
  font-size: 22px;
  font-weight: normal;
  opacity: 0.85;
  margin-top: 4px;
}

#clue {
  display: inline-block;
  font-size: 55px;
}

/* BOTTOM BUTTON CONTAINER STACK */
.controls-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  margin-bottom: 5px;
  flex-shrink: 0;
}

.footer {
  display: flex;
  gap: 12px;
}
.footer button { flex: 1; }

select {
  width: 100%;
  padding: 12px;
  font-size: 16px; /* prevents iOS auto-zoom on focus */
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-sizing: border-box;
}

table { width: 100%; margin-top: 15px; }
td { padding: 8px; font-size: 18px; }

/* ---------- Small phones ---------- */
@media (max-width: 359px), (max-height: 600px) {
  h1 { font-size: 22px; margin-top: 8px; }
  .info { font-size: 20px; }
  .game-center-container { font-size: 42px; }
  #clue { font-size: 42px; }
  #hint { font-size: 17px; }
  button { padding: 13px; font-size: 17px; }
  .card { padding: 16px; }
}

/* ---------- Landscape phones (short viewport) ---------- */
@media (max-height: 480px) and (orientation: landscape) {
  #app { padding-top: calc(8px + env(safe-area-inset-top)); }
  h1 { font-size: 18px; margin: 4px 0; }
  .info { font-size: 18px; padding-top: 4px; }
  .game-center-container { font-size: 34px; gap: 6px; }
  #clue { font-size: 34px; }
  #hint { font-size: 15px; margin-top: 2px; }
  .controls-container { gap: 8px; }
  button { padding: 10px; font-size: 15px; min-height: 40px; }
}

/* ---------- Tablet / iPad portrait and up ---------- */
@media (min-width: 600px) {
  #app { max-width: 620px; }
  h1 { font-size: 36px; margin-top: 20px; }
  .card { padding: 28px; border-radius: 24px; }
  .info { font-size: 32px; }
  .game-center-container { font-size: 80px; gap: 18px; }
  #clue { font-size: 80px; }
  #hint { font-size: 30px; margin-top: 8px; }
  button { padding: 20px; font-size: 24px; border-radius: 18px; }
  select { padding: 14px; font-size: 20px; }
  .controls-container { gap: 16px; }
  .footer { gap: 16px; }
  td { font-size: 20px; }
}

/* ---------- iPad landscape / large tablets ---------- */
@media (min-width: 900px) {
  #app { max-width: 720px; }
  .game-center-container { font-size: 100px; }
  #clue { font-size: 100px; }
  h1 { font-size: 42px; }
}
</style>
</head>

<body>
<div id="app">

<!-- START -->
<div id="start" class="screen show">
  <div>
    <h1>📖 Emoji Bible Guess</h1>
    <div class="card">
      <h2>Select Teams</h2>
      <select id="teams">
        <option value="individual">🙋 Individual</option>
        <option value="2">2 Teams</option>
        <option value="3">3 Teams</option>
        <option value="4">4 Teams</option>
        <option value="5">5 Teams</option>
      </select>

      <h2>Select Category</h2>
      <select id="category">
        <option value="mixed">🔀 Mixed</option>
        <option value="bible">📖 Bible Characters</option>
        <option value="feasts">🌿 Feasts & Events</option>
        <option value="funny">😂 Funny Sounds</option>
      </select>

      <button class="primary" onclick="startGame()">Start Game</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="info">
    <div>⏱ <span id="time">60</span></div>
    <div>⭐ <span id="score">0</span></div>
    <div id="teamInfo">🏆 T<span id="team">1</span></div>
  </div>

  <div class="game-center-container">
    <span id="emoji">📊</span>
    <span id="hint"></span>
    <span id="clue"></span>
  </div>

  <div class="controls-container">
    <div class="footer">
      <button class="primary" onclick="correct()">✓ Correct</button>
      <button class="secondary" onclick="skip()">⏭ Skip</button>
    </div>
    <button class="blue" onclick="revealAnswer()">👁️ Reveal Answer</button>
    <button class="red" onclick="endGame()">⛔ End Game</button>
  </div>
</div>

<!-- BETWEEN -->
<div id="between" class="screen" style="justify-content: center;">
  <h1>Team <span id="nextTeam">2</span></h1>
  <div class="card">
    <h2>Pass the phone 📱</h2>
    <button class="blue" onclick="nextTeam()">Start</button>
  </div>
</div>

<!-- END -->
<div id="end" class="screen" style="justify-content: center;">
  <h1>🏆 Game Over</h1>
  <div class="card">
    <h2 id="winner"></h2>
    <table id="results"></table>
    <button class="primary" onclick="location.reload()">Play Again</button>
  </div>
</div>

</div>

<script>
const cards = [
  /* 📖 BIBLE CHARACTERS */
  {e:"👨🍎🌳", a:"Adam", c:"bible"},
  {e:"👩🍎🐍", a:"Eve", c:"bible"},
  {e:"🌧️⛵🦒🦁", a:"Noah", c:"bible"},
  {e:"⭐👴🐪", a:"Abraham", c:"bible"},
  {e:"👦🔥🐏", a:"Isaac", c:"bible"},
  {e:"🌈👕💤🌾", a:"Joseph", c:"bible"},
  {e:"👶🧺🐊", a:"Moses", c:"bible"},
  {e:"💪🦁✂️", a:"Samson", c:"bible"},
  {e:"🌾👩❤️", a:"Ruth", c:"bible"},
  {e:"👑🎶❤️", a:"David", c:"bible"},
  {e:"👑👶🗡️", a:"Solomon", c:"bible"},
  {e:"🔥🐂🐦‍⬛🍞", a:"Elijah", c:"bible"},
  {e:"🌊🐋🙏", a:"Jonah", c:"bible"},
  {e:"🦁🙏", a:"Daniel", c:"bible"},
  {e:"👸✡️📜💍", a:"Esther", c:"bible"},
  {e:"🌊🕊️🩴🏕️🦗", a:"John the Baptist", c:"bible"},
  {e:"🪽🤱🌠🐑", a:"Jesus", c:"bible"},

  /* 🌿 FEASTS & EVENTS */
  {e:"🕎", a:"Hanukkah", c:"feasts"},
  {e:"🌿🩸🐑🚪", a:"Passover", c:"feasts"},
  {e:"🔥🕊️", a:"Pentecost", c:"feasts"},
  {e:"✝️🪦✨", a:"Resurrection", c:"feasts"},
  {e:"✝️🩸🌑", a:"Crucifixion", c:"feasts"},

  /* 😂 FUNNY SOUNDS */
  {e:"🌱✅", h:"Root Truth", a:"Ruth", c:"funny"},
  {e:"🚫 AHH", a:"Noah", c:"funny"},
  {e:"✅🗣️", h:"Done Yell", a:"Daniel", c:"funny"},
  {e:"Yester", a:"Esther", c:"funny"},
  {e:"🤵👰️", h:"Present Tense", a:"Mary", c:"funny"},
  {e:"Luxurious", a:"Lazarus", c:"funny"},
  {e:"🐍S", h:"Starts with B", a:"Boaz", c:"funny"},
  {e:"📊", h:"Poll", a:"Paul", c:"funny"}
];

let teamCount = 2;
let isIndividual = false;
let team = 1;
let score = 0;
let time = 60;
let timer;
let used = [];
let scores = [];
let selectedCategory = "mixed";
let currentCard = null;

function startGame(){
  const teamsValue = document.getElementById("teams").value;
  isIndividual = teamsValue === "individual";
  teamCount = isIndividual ? 1 : parseInt(teamsValue);
  selectedCategory = document.getElementById("category").value;
  scores = Array(teamCount).fill(0);

  document.getElementById("start").classList.remove("show");
  document.getElementById("game").classList.add("show");

  startRound();
}

function getCards(){
  return selectedCategory === "mixed"
    ? cards
    : cards.filter(c => c.c === selectedCategory);
}

function startRound(){
  time = 60;
  score = 0;
  used = [];

  updateTeamDisplay();

  nextCard();

  timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;
    if(time <= 0) endRound();
  },1000);
}

function updateTeamDisplay(){
  const el = document.getElementById("teamInfo");
  el.innerHTML = isIndividual ? "🙋 You" : ("🏆 T" + team);
}

function nextCard(){
  let pool = getCards();

  if(used.length === pool.length) used = [];

  let i;
  do {
    i = Math.floor(Math.random() * pool.length);
  } while(used.includes(i));

  used.push(i);

  currentCard = pool[i];

  document.getElementById("emoji").innerText = currentCard.e;
  document.getElementById("hint").innerText = currentCard.h ? ("(" + currentCard.h + ")") : "";
  document.getElementById("clue").innerText = "";
}

function revealAnswer(){
  if(!currentCard) return;

  document.getElementById("clue").innerText = " " + currentCard.a;
}

function correct(){
  score++;
  scores[team-1] = score;
  document.getElementById("score").innerText = score;
  nextCard();
}

function skip(){
  nextCard();
}

function endGame(){
  clearInterval(timer);
  showResults();
}

function endRound(){
  clearInterval(timer);

  if(team < teamCount){
    team++;
    document.getElementById("nextTeam").innerText = team;
    document.getElementById("game").classList.remove("show");
    document.getElementById("between").classList.add("show");
  } else {
    showResults();
  }
}

function nextTeam(){
  document.getElementById("between").classList.remove("show");
  document.getElementById("game").classList.add("show");
  startRound();
}

function showResults(){
  document.getElementById("game").classList.remove("show");
  document.getElementById("between").classList.remove("show");
  document.getElementById("end").classList.add("show");

  if(isIndividual){
    document.getElementById("results").innerHTML = "";
    document.getElementById("winner").innerText = "Final Score: " + scores[0] + " 🎉";
    return;
  }

  let table = "";
  let max = 0;
  let winner = 1;

  scores.forEach((s,i)=>{
    if(s > max){
      max = s;
      winner = i+1;
    }
    table += `<tr><td>Team ${i+1}</td><td>${s}</td></tr>`;
  });

  document.getElementById("results").innerHTML = table;
  document.getElementById("winner").innerText = "Team " + winner + " Wins 🎉";
}
</script>
</body>
</html>
