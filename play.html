<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Emoji Bible Guess</title>

<style>
* { -webkit-tap-highlight-color: transparent; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #2b5876, #4e4376);
  color: white;
  height: 100vh;
  height: 100dvh; 
  overflow: hidden;
  box-sizing: border-box;
  -webkit-text-size-adjust: 100%;
  overscroll-behavior-y: none;
}

#app {
  max-width: 500px;
  margin: auto;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: calc(16px + env(safe-area-inset-top)) 20px calc(20px + env(safe-area-inset-bottom)); 
  padding-left: calc(20px + env(safe-area-inset-left));
  padding-right: calc(20px + env(safe-area-inset-right));
  box-sizing: border-box;
}

.screen { 
  display: none; 
  flex-direction: column; 
  height: 100%; 
  justify-content: space-between; 
}
.show { display: flex; }

h1 { 
  text-align: center; 
  margin-top: 15px; 
  margin-bottom: 10px;
  font-size: 28px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  box-sizing: border-box;
}

#start {
  justify-content: center;
}
#start .card {
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 15px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  min-height: 44px;
  touch-action: manipulation;
}

.primary { background: #00c853; color: white; }
.secondary { background: #ffca28; color: black; }
.blue { background: #2196f3; color: white; }
.red { background: #e53935; color: white; }
.purple { background: #9c27b0; color: white; }
.brown { background: #795548; color: white; }

.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.65);
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
  box-sizing: border-box;
}
.modal-overlay.show { display: flex; }
.modal-box {
  background: white;
  color: black;
  border-radius: 20px;
  padding: 24px;
  width: 100%;
  max-width: 360px;
  text-align: center;
  box-sizing: border-box;
}
.modal-box h2 { margin-top: 0; }
.modal-actions {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 10px;
}

/* TOP HEADER INFO BAR */
.info {
  display: flex;
  justify-content: space-between;
  font-size: 26px;
  font-weight: bold;
  padding-top: 10px;
}

/* CENTERED PLAY AREA */
.game-center-container {
  flex: 1;
  display: flex;
  flex-direction: row;
  flex-wrap: wrap;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 55px;
  font-weight: bold;
  text-align: center;
  min-height: 0;
}

#emoji {
  display: inline-block;
}

#hint {
  display: block;
  width: 100%;
  font-size: 22px;
  font-weight: normal;
  opacity: 0.85;
  margin-top: 4px;
}

#bookName {
  font-size: 46px;
  font-weight: bold;
  text-align: center;
}

#feedback {
  font-size: 26px;
  font-weight: bold;
  text-align: center;
  margin-top: 14px;
  min-height: 32px;
}

#clue {
  display: inline-block;
  font-size: 55px;
}

/* BOTTOM BUTTON CONTAINER STACK */
.controls-container {
  display: flex;
  flex-direction: column;
  gap: 12px;
  width: 100%;
  margin-bottom: 5px;
  flex-shrink: 0;
}

.footer {
  display: flex;
  gap: 12px;
}
.footer button { flex: 1; }

select {
  width: 100%;
  padding: 12px;
  font-size: 16px; /* prevents iOS auto-zoom on focus */
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-sizing: border-box;
}

table { width: 100%; margin-top: 15px; }
td { padding: 8px; font-size: 18px; }

/* ---------- Small phones ---------- */
@media (max-width: 359px), (max-height: 600px) {
  h1 { font-size: 22px; margin-top: 8px; }
  .info { font-size: 20px; }
  .game-center-container { font-size: 42px; }
  #clue { font-size: 42px; }
  #hint { font-size: 17px; }
  #bookName { font-size: 32px; }
  #feedback { font-size: 20px; }
  button { padding: 13px; font-size: 17px; }
  .card { padding: 16px; }
}

/* ---------- Landscape phones (short viewport) ---------- */
@media (max-height: 480px) and (orientation: landscape) {
  #app { padding-top: calc(8px + env(safe-area-inset-top)); }
  h1 { font-size: 18px; margin: 4px 0; }
  .info { font-size: 18px; padding-top: 4px; }
  .game-center-container { font-size: 34px; gap: 6px; }
  #clue { font-size: 34px; }
  #hint { font-size: 15px; margin-top: 2px; }
  #bookName { font-size: 26px; }
  #feedback { font-size: 17px; margin-top: 6px; min-height: 22px; }
  .controls-container { gap: 8px; }
  button { padding: 10px; font-size: 15px; min-height: 40px; }
}

/* ---------- Tablet / iPad portrait and up ---------- */
@media (min-width: 600px) {
  #app { max-width: 620px; }
  h1 { font-size: 36px; margin-top: 20px; }
  .card { padding: 28px; border-radius: 24px; }
  .info { font-size: 32px; }
  .game-center-container { font-size: 80px; gap: 18px; }
  #clue { font-size: 80px; }
  #hint { font-size: 30px; margin-top: 8px; }
  #bookName { font-size: 64px; }
  #feedback { font-size: 34px; margin-top: 18px; min-height: 42px; }
  button { padding: 20px; font-size: 24px; border-radius: 18px; }
  select { padding: 14px; font-size: 20px; }
  .controls-container { gap: 16px; }
  .footer { gap: 16px; }
  td { font-size: 20px; }
}

/* ---------- iPad landscape / large tablets ---------- */
@media (min-width: 900px) {
  #app { max-width: 720px; }
  .game-center-container { font-size: 100px; }
  #clue { font-size: 100px; }
  h1 { font-size: 42px; }
}
</style>
</head>

<body>
<div id="app">

<!-- START -->
<div id="start" class="screen show">
  <div>
    <h1>📖 Emoji Bible Guess</h1>
    <div class="card">
      <h2>Select Teams</h2>
      <select id="teams">
        <option value="individual">🙋 Individual</option>
        <option value="2">2 Teams</option>
        <option value="3">3 Teams</option>
        <option value="4">4 Teams</option>
        <option value="5">5 Teams</option>
      </select>

      <h2>Select Category</h2>
      <select id="category">
        <option value="mixed">🔀 Mixed</option>
        <option value="bible">📖 Bible Characters</option>
        <option value="feasts">🌿 Feasts & Events</option>
        <option value="stories">📜 Bible Stories</option>
        <option value="phrases">💬 Bible Phrases</option>
        <option value="funny">😂 Funny Sounds - Bible Characters</option>
        <option value="testament">📚 Old or New Testament?</option>
      </select>

      <button class="primary" onclick="startGame()">Start Game</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="info">
    <div>⏱ <span id="time">60</span></div>
    <div>⭐ <span id="score">0</span></div>
    <div id="teamInfo">🏆 T<span id="team">1</span></div>
  </div>
  <div id="categoryDisplay" style="text-align:center; font-size:14px; opacity:0.85; margin-top:2px;"></div>

  <div class="game-center-container" id="emojiCenter">
    <span id="emoji">📊</span>
    <span id="hint"></span>
    <span id="clue"></span>
  </div>

  <div class="game-center-container" id="testamentCenter" style="display:none; flex-direction:column;">
    <div id="bookName">Genesis</div>
    <div id="feedback"></div>
  </div>

  <div class="controls-container" id="emojiControls">
    <div class="footer">
      <button class="primary" onclick="correct()">✓ Correct</button>
      <button class="secondary" onclick="skip()">⏭ Skip</button>
    </div>
    <div class="footer">
      <button class="blue" onclick="revealAnswer()">👁️ Reveal Answer</button>
      <button class="purple" onclick="openCategoryModal()">🔀 Change Category</button>
    </div>
    <button class="red" onclick="endGame()">⛔ End Game</button>
  </div>

  <div class="controls-container" id="testamentControls" style="display:none;">
    <div class="footer">
      <button class="brown" onclick="answerTestament('old')">📜 Old Testament</button>
      <button class="blue" onclick="answerTestament('new')">✝️ New Testament</button>
    </div>
    <button class="purple" onclick="openCategoryModal()">🔀 Change Category</button>
    <button class="red" onclick="endGame()">⛔ End Game</button>
  </div>
</div>

<!-- BETWEEN -->
<div id="between" class="screen" style="justify-content: center;">
  <h1>Team <span id="nextTeam">2</span></h1>
  <div class="card">
    <h2>Pass the phone 📱</h2>
    <button class="blue" onclick="nextTeam()">Start</button>
  </div>
</div>

<!-- CHANGE CATEGORY MODAL -->
<div class="modal-overlay" id="categoryModal">
  <div class="modal-box">
    <h2>Change Category</h2>
    <select id="inGameCategory">
      <option value="mixed">🔀 Mixed</option>
      <option value="bible">📖 Bible Characters</option>
      <option value="feasts">🌿 Feasts & Events</option>
      <option value="stories">📜 Bible Stories</option>
      <option value="phrases">💬 Bible Phrases</option>
      <option value="funny">😂 Funny Sounds - Bible Characters</option>
      <option value="testament">📚 Old or New Testament?</option>
    </select>
    <div class="modal-actions">
      <button class="primary" onclick="applyCategoryChange()">Apply</button>
      <button class="secondary" onclick="cancelCategoryChange()">Cancel</button>
    </div>
  </div>
</div>

<!-- END -->
<div id="end" class="screen" style="justify-content: center;">
  <h1>🏆 Game Over</h1>
  <div class="card">
    <h2 id="winner"></h2>
    <table id="results"></table>
    <button class="primary" onclick="location.reload()">Play Again</button>
  </div>
</div>

</div>

<script>
const cards = [
  /* 📖 BIBLE CHARACTERS */
  {e:"👨🍎🌳", a:"Adam", c:"bible"},
  {e:"👩🍎🐍", a:"Eve", c:"bible"},
  {e:"🌧️⛵🦒🦁", a:"Noah", c:"bible"},
  {e:"⭐👴🐪", a:"Abraham", c:"bible"},
  {e:"👦🔥🐏", a:"Isaac", c:"bible"},
  {e:"🌈👕💤🌾", a:"Joseph", c:"bible"},
  {e:"👶🧺🐊", a:"Moses", c:"bible"},
  {e:"💪🦁✂️", a:"Samson", c:"bible"},
  {e:"🌾👩❤️", a:"Ruth", c:"bible"},
  {e:"👑🎶❤️", a:"David", c:"bible"},
  {e:"👑👶🗡️", a:"Solomon", c:"bible"},
  {e:"🔥🐂🐦‍⬛🍞", a:"Elijah", c:"bible"},
  {e:"🌊🐋🙏", a:"Jonah", c:"bible"},
  {e:"🦁🙏", a:"Daniel", c:"bible"},
  {e:"👸✡️📜💍", a:"Esther", c:"bible"},
  {e:"🌊🕊️🩴🏕️🦗", a:"John the Baptist", c:"bible"},
  {e:"🪽🤱🌠🐑", a:"Jesus", c:"bible"},
  {e:"💰💋", a:"Judas", c:"bible"},
  {e:"🎣🗝️⛪", a:"Peter", c:"bible"},
  {e:"🌈🍇🕵️‍♂️🕵️‍♂️", h:"2 out of 10", a:"Joshua & Caleb", c:"bible"},
  {e:"🌳👨💰", a:"Zacchaeus", c:"bible"},
  {e:"🗣️🎺🔥", a:"Gideon", c:"bible"},

  /* 🌿 FEASTS & EVENTS */
  {e:"🕎", a:"Hanukkah", c:"feasts"},
  {e:"🌿🩸🐑🚪", a:"Passover", c:"feasts"},
  {e:"🔥🕊️", a:"Pentecost", c:"feasts"},
  {e:"✝️🪦✨", a:"Resurrection", c:"feasts"},
  {e:"✝️🩸🌑", a:"Crucifixion", c:"feasts"},
  {e:"☁️⬆️", a:"Ascension", c:"feasts"},
  {e:"🌿🙌", a:"Palm Sunday", c:"feasts"},

  /* 📜 BIBLE STORIES */
  {e:"🍞🐟", a:"Feeding of the 5,000", c:"stories"},
  {e:"🤱⭐🐑", a:"Birth of Jesus", c:"stories"},
  {e:"💧➡️🍷", a:"Jesus turns water into wine", c:"stories"},
  {e:"🌊👣", a:"Peter walks on water", c:"stories"},
  {e:"🐖🏃💰🤗", a:"Parable of the Prodigal Son", c:"stories"},
  {e:"🍞🍷👥", a:"Last Supper", c:"stories"},
  {e:"👬🎤🎶⛓️‍💥", a:"Paul & Silas in prison", c:"stories"},

  /* 💬 BIBLE PHRASES */
  {e:"🏃🏻‍♀️🏁", a:"Run the race", c:"phrases"},
  {e:"🌈🥛🍯", a:"Promised land", c:"phrases"},

  /* 😂 FUNNY SOUNDS */
  {e:"🌱✅", h:"Root Truth", a:"Ruth", c:"funny"},
  {e:"🚫 AHH", a:"Noah", c:"funny"},
  {e:"✅🗣️", h:"Done Yell", a:"Daniel", c:"funny"},
  {e:"Yester", a:"Esther", c:"funny"},
  {e:"🤵👰️", h:"Present Tense", a:"Mary", c:"funny"},
  {e:"Luxurious", a:"Lazarus", c:"funny"},
  {e:"🐍S", h:"Starts with B", a:"Boaz", c:"funny"},
  {e:"📊", h:"Poll", a:"Paul", c:"funny"},
  {e:"👀", h:"Look", a:"Luke", c:"funny"}
];

const BOOKS = [
  {name:"Genesis", t:"old"}, {name:"Exodus", t:"old"}, {name:"Leviticus", t:"old"},
  {name:"Numbers", t:"old"}, {name:"Deuteronomy", t:"old"}, {name:"Joshua", t:"old"},
  {name:"Judges", t:"old"}, {name:"Ruth", t:"old"}, {name:"1 Samuel", t:"old"},
  {name:"2 Samuel", t:"old"}, {name:"1 Kings", t:"old"}, {name:"2 Kings", t:"old"},
  {name:"1 Chronicles", t:"old"}, {name:"2 Chronicles", t:"old"}, {name:"Ezra", t:"old"},
  {name:"Nehemiah", t:"old"}, {name:"Esther", t:"old"}, {name:"Job", t:"old"},
  {name:"Psalms", t:"old"}, {name:"Proverbs", t:"old"}, {name:"Ecclesiastes", t:"old"},
  {name:"Song of Solomon", t:"old"}, {name:"Isaiah", t:"old"}, {name:"Jeremiah", t:"old"},
  {name:"Lamentations", t:"old"}, {name:"Ezekiel", t:"old"}, {name:"Daniel", t:"old"},
  {name:"Hosea", t:"old"}, {name:"Joel", t:"old"}, {name:"Amos", t:"old"},
  {name:"Obadiah", t:"old"}, {name:"Jonah", t:"old"}, {name:"Micah", t:"old"},
  {name:"Nahum", t:"old"}, {name:"Habakkuk", t:"old"}, {name:"Zephaniah", t:"old"},
  {name:"Haggai", t:"old"}, {name:"Zechariah", t:"old"}, {name:"Malachi", t:"old"},

  {name:"Matthew", t:"new"}, {name:"Mark", t:"new"}, {name:"Luke", t:"new"},
  {name:"John", t:"new"}, {name:"Acts", t:"new"}, {name:"Romans", t:"new"},
  {name:"1 Corinthians", t:"new"}, {name:"2 Corinthians", t:"new"}, {name:"Galatians", t:"new"},
  {name:"Ephesians", t:"new"}, {name:"Philippians", t:"new"}, {name:"Colossians", t:"new"},
  {name:"1 Thessalonians", t:"new"}, {name:"2 Thessalonians", t:"new"}, {name:"1 Timothy", t:"new"},
  {name:"2 Timothy", t:"new"}, {name:"Titus", t:"new"}, {name:"Philemon", t:"new"},
  {name:"Hebrews", t:"new"}, {name:"James", t:"new"}, {name:"1 Peter", t:"new"},
  {name:"2 Peter", t:"new"}, {name:"1 John", t:"new"}, {name:"2 John", t:"new"},
  {name:"3 John", t:"new"}, {name:"Jude", t:"new"}, {name:"Revelation", t:"new"}
];

const CATEGORY_LABELS = {
  mixed: "🔀 Mixed",
  bible: "📖 Bible Characters",
  feasts: "🌿 Feasts & Events",
  stories: "📜 Bible Stories",
  phrases: "💬 Bible Phrases",
  funny: "😂 Funny Sounds - Bible Characters",
  testament: "📚 Old or New Testament?"
};

let teamCount = 2;
let isIndividual = false;
let team = 1;
let score = 0;
let time = 60;
let timer;
let used = [];
let scores = [];
let selectedCategory = "mixed";
let currentCard = null;
let currentBook = null;
let usedBooks = [];

function startGame(){
  const teamsValue = document.getElementById("teams").value;
  isIndividual = teamsValue === "individual";
  teamCount = isIndividual ? 1 : parseInt(teamsValue);
  selectedCategory = document.getElementById("category").value;
  scores = Array(teamCount).fill(0);

  document.getElementById("start").classList.remove("show");
  document.getElementById("game").classList.add("show");

  startRound();
}

function getCards(){
  return selectedCategory === "mixed"
    ? cards
    : cards.filter(c => c.c === selectedCategory);
}

function startRound(){
  time = 60;
  score = 0;
  used = [];
  usedBooks = [];

  updateTeamDisplay();
  updateModeUI();

  nextCard();

  resumeTimer();
}

function isTestamentMode(){
  return selectedCategory === "testament";
}

function updateModeUI(){
  const testament = isTestamentMode();
  document.getElementById("emojiCenter").style.display = testament ? "none" : "flex";
  document.getElementById("testamentCenter").style.display = testament ? "flex" : "none";
  document.getElementById("emojiControls").style.display = testament ? "none" : "flex";
  document.getElementById("testamentControls").style.display = testament ? "flex" : "none";
  document.getElementById("categoryDisplay").innerText = CATEGORY_LABELS[selectedCategory] || "";
}

function resumeTimer(){
  clearInterval(timer);
  timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;
    if(time <= 0) endRound();
  },1000);
}

function updateTeamDisplay(){
  const el = document.getElementById("teamInfo");
  el.innerHTML = isIndividual ? "🙋 You" : ("🏆 T" + team);
}

function openCategoryModal(){
  clearInterval(timer);
  document.getElementById("inGameCategory").value = selectedCategory;
  document.getElementById("categoryModal").classList.add("show");
}

function applyCategoryChange(){
  selectedCategory = document.getElementById("inGameCategory").value;
  used = [];
  usedBooks = [];
  document.getElementById("categoryModal").classList.remove("show");
  updateModeUI();
  nextCard();
  resumeTimer();
}

function cancelCategoryChange(){
  document.getElementById("categoryModal").classList.remove("show");
  resumeTimer();
}

function nextCard(){
  if(isTestamentMode()){
    nextBook();
    return;
  }

  let pool = getCards();

  if(used.length === pool.length) used = [];

  let i;
  do {
    i = Math.floor(Math.random() * pool.length);
  } while(used.includes(i));

  used.push(i);

  currentCard = pool[i];

  document.getElementById("emoji").innerText = currentCard.e;
  document.getElementById("hint").innerText = currentCard.h ? ("(" + currentCard.h + ")") : "";
  document.getElementById("clue").innerText = "";

  document.getElementById("categoryDisplay").innerText =
    selectedCategory === "mixed" ? (CATEGORY_LABELS[currentCard.c] || "") : (CATEGORY_LABELS[selectedCategory] || "");
}

function nextBook(){
  if(usedBooks.length === BOOKS.length) usedBooks = [];

  let i;
  do {
    i = Math.floor(Math.random() * BOOKS.length);
  } while(usedBooks.includes(i));

  usedBooks.push(i);

  currentBook = BOOKS[i];

  document.getElementById("bookName").innerText = currentBook.name;
  document.getElementById("feedback").innerText = "";
}

function answerTestament(choice){
  if(!currentBook) return;

  const feedback = document.getElementById("feedback");

  if(choice === currentBook.t){
    score++;
    scores[team-1] = score;
    document.getElementById("score").innerText = score;
    feedback.innerText = "✅ Correct!";
    feedback.style.color = "#00c853";
  } else {
    const correctLabel = currentBook.t === "old" ? "Old Testament" : "New Testament";
    feedback.innerText = "❌ Wrong — it's " + correctLabel;
    feedback.style.color = "#e53935";
  }

  setTimeout(nextBook, 800);
}

function revealAnswer(){
  if(!currentCard) return;

  document.getElementById("clue").innerText = " " + currentCard.a;
}

function correct(){
  score++;
  scores[team-1] = score;
  document.getElementById("score").innerText = score;
  nextCard();
}

function skip(){
  nextCard();
}

function endGame(){
  clearInterval(timer);
  showResults();
}

function endRound(){
  clearInterval(timer);

  if(team < teamCount){
    team++;
    document.getElementById("nextTeam").innerText = team;
    document.getElementById("game").classList.remove("show");
    document.getElementById("between").classList.add("show");
  } else {
    showResults();
  }
}

function nextTeam(){
  document.getElementById("between").classList.remove("show");
  document.getElementById("game").classList.add("show");
  startRound();
}

function showResults(){
  document.getElementById("game").classList.remove("show");
  document.getElementById("between").classList.remove("show");
  document.getElementById("end").classList.add("show");

  if(isIndividual){
    document.getElementById("results").innerHTML = "";
    document.getElementById("winner").innerText = "Final Score: " + scores[0] + " 🎉";
    return;
  }

  let table = "";
  let max = 0;
  let winner = 1;

  scores.forEach((s,i)=>{
    if(s > max){
      max = s;
      winner = i+1;
    }
    table += `<tr><td>Team ${i+1}</td><td>${s}</td></tr>`;
  });

  document.getElementById("results").innerHTML = table;
  document.getElementById("winner").innerText = "Team " + winner + " Wins 🎉";
}
</script>
</body>
</html>
