<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Emoji Bible Guess</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

background:linear-gradient(180deg,#2b5876,#4e4376);

height:100vh;

overflow:hidden;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

#app{

width:100%;
max-width:500px;

height:100vh;

padding:20px;

display:flex;

flex-direction:column;

}

.screen{

display:none;

height:100%;

}

.show{

display:flex;

flex-direction:column;

}

h1{

text-align:center;

font-size:38px;

margin-top:50px;

}

.subtitle{

text-align:center;

opacity:.9;

margin-top:10px;

font-size:18px;

}

.card{

background:white;

color:#333;

border-radius:24px;

padding:30px;

margin-top:30px;

text-align:center;

box-shadow:0 12px 30px rgba(0,0,0,.25);

}

.bigEmoji{

font-size:78px;

line-height:1.4;

}

button{

border:none;

border-radius:18px;

padding:18px;

font-size:22px;

font-weight:bold;

cursor:pointer;

margin-top:18px;

transition:.2s;

}

button:active{

transform:scale(.96);

}

.primary{

background:#00c853;

color:white;

}

.secondary{

background:#ffca28;

color:#222;

}

.red{

background:#e53935;

color:white;

}

.blue{

background:#2196f3;

color:white;

}

.info{

display:flex;

justify-content:space-between;

margin-top:20px;

font-size:24px;

font-weight:bold;

}

#timer{

font-size:34px;

}

#score{

font-size:34px;

}

#emojiCard{

flex:1;

display:flex;

justify-content:center;

align-items:center;

font-size:90px;

text-align:center;

}

.footerButtons{

display:flex;

gap:15px;

margin-bottom:20px;

}

.footerButtons button{

flex:1;

}

.teamSelect{

margin-top:35px;

}

.teamSelect select{

width:100%;

padding:16px;

border-radius:12px;

font-size:22px;

margin-top:10px;

}

.resultScore{

font-size:70px;

text-align:center;

margin-top:25px;

font-weight:bold;

}

.resultText{

text-align:center;

font-size:24px;

margin-top:15px;

}

table{

width:100%;

margin-top:25px;

border-collapse:collapse;

}

td{

padding:12px;

font-size:22px;

}

tr:nth-child(even){

background:rgba(255,255,255,.08);

}

.fade{

animation:fade .25s;

}

@keyframes fade{

from{

opacity:0;

transform:scale(.9);

}

to{

opacity:1;

transform:scale(1);

}

}

</style>

</head>

<body>

<div id="app">

<!-- START SCREEN -->

<div id="startScreen" class="screen show">

<h1>📖 Emoji Bible Guess</h1>

<div class="subtitle">

Guess the Bible character or event from the emojis!

</div>

<div class="card">

<h2>Select Teams</h2>

<div class="teamSelect">

<select id="teamCount">

<option value="2">2 Teams</option>

<option value="3">3 Teams</option>

<option value="4">4 Teams</option>

<option value="5">5 Teams</option>

<option value="6">6 Teams</option>

<option value="7">7 Teams</option>

<option value="8">8 Teams</option>

</select>

</div>

<button id="startBtn" class="primary">

▶ Start Game

</button>

</div>

</div>

<!-- GAME SCREEN -->

<div id="gameScreen" class="screen">

<div class="info">

<div>

⏱ <span id="timer">60</span>

</div>

<div>

⭐ <span id="score">0</span>

</div>

</div>

<div id="emojiCard">

👑👶🗡️

</div>

<div class="footerButtons">

<button id="correctBtn" class="primary">

✅ Correct

</button>

<button id="skipBtn" class="secondary">

⏭ Skip

</button>

</div>

</div>

<!-- BETWEEN TEAMS -->

<div id="teamScreen" class="screen">

<h1>

Team

<span id="teamNumber">

2

</span>

</h1>

<div class="card">

<h2>

Pass the phone!

</h2>

<p style="margin-top:20px;font-size:22px;">

When everyone is ready...

</p>

<button id="nextTeamBtn" class="blue">

Start Turn

</button>

</div>

</div>

<!-- GAME OVER -->

<div id="gameOverScreen" class="screen">

<h1>

🏆 Game Finished

</h1>

<div class="resultScore" id="winner">

Team 1 Wins!

</div>

<div class="resultText">

Final Scores

</div>

<table id="resultsTable">

</table>

<button id="playAgainBtn" class="primary">

Play Again

</button>

</div>

</div>

<script>

/*

PART 2

starts here...

*/

</script>

</body>
</html>
