<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Emoji Bible Guess</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #2b5876, #4e4376);
  color: white;
  height: 100vh;
  height: 100dvh; 
  overflow: hidden;
  box-sizing: border-box;
}

#app {
  max-width: 500px;
  margin: auto;
  height: 100vh;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom)); 
  box-sizing: border-box;
}

.screen { 
  display: none; 
  flex-direction: column; 
  height: 100%; 
  justify-content: space-between; 
}
.show { display: flex; }

h1 { 
  text-align: center; 
  margin-top: 15px; 
  margin-bottom: 10px;
  font-size: 28px;
}

.card {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 20px;
  text-align: center;
  box-sizing: border-box;
}

#start {
  justify-content: center;
}
#start .card {
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 16px;
  border: none;
  border-radius: 15px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.primary { background: #00c853; color: white; }
.secondary { background: #ffca28; color: black; }
.blue { background: #2196f3; color: white; }
.red { background: #e53935; color: white; }

/* TOP HEADER INFO BAR */
.info {
  display: flex;
  justify-content: space-between;
  font-size: 26px;
  font-weight: bold;
  padding-top: 10px;
}

/* CENTERED PLAY AREA (MATCHING SCREENSHOT) */
.game-center-container {
  flex: 1;
  display: flex;
  flex-direction: row; /* Rows emojis and clues side-by-side if needed, or inline */
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-size: 55px; /* Unified large text sizing for center elements */
  font-weight: bold;
  text-align: center;
}

#emoji {
  display: inline-block;
}

#clue {
  display: inline-block;
  font-size: 55px; /* Matches emoji size exactly as seen in screenshot */
}

/* BOTTOM BUTTON CONTAINER STACK */
.controls-container {
  display: flex;
  flex-direction: column;
  gap: 12px; /* Uniform margins between all action item rows */
  width: 100%;
  margin-bottom: 5px;
}

.footer {
  display: flex;
  gap: 12px;
}
.footer button { flex: 1; }

select {
  width: 100%;
  padding: 12px;
  font-size: 18px;
  margin-top: 5px;
  margin-bottom: 15px;
  border-radius: 10px;
  box-sizing: border-box;
}

table { width: 100%; margin-top: 15px; }
td { padding: 8px; font-size: 18px; }
</style>
</head>

<body>
<div id="app">

<!-- START -->
<div id="start" class="screen show">
  <div>
    <h1>📖 Emoji Bible Guess</h1>
    <div class="card">
      <h2>Select Teams</h2>
      <select id="teams">
        <option value="2">2 Teams</option>
        <option value="3">3 Teams</option>
        <option value="4">4 Teams</option>
        <option value="5">5 Teams</option>
      </select>

      <h2>Select Category</h2>
      <select id="category">
        <option value="mixed">🔀 Mixed</option>
        <option value="bible">📖 Bible Characters</option>
        <option value="feasts">🌿 Feasts & Events</option>
        <option value="funny">😂 Funny Sounds</option>
      </select>

      <button class="primary" onclick="startGame()">Start Game</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="game" class="screen">
  <div class="info">
    <div>⏱ <span id="time">60</span></div>
    <div>⭐ <span id="score">0</span></div>
    <div>🏆 T<span id="team">1</span></div>
  </div>

  <!-- Items wrapped into a unified center flex layout matching Screenshot 2026-07-03 at 1.19.36 AM.png -->
  <div class="game-center-container">
    <span id="emoji">📊</span>
    <span id="clue"></span>
  </div>

  <div class="controls-container">
    <div class="footer">
      <button class="primary" onclick="correct()">✓ Correct</button>
      <button class="secondary" onclick="skip()">⏭ Skip</button>
    </div>
    <button class="blue" onclick="revealAnswer()">👁️ Reveal Answer</button>
    <button class="red" onclick="endGame()">⛔ End Game</button>
  </div>
</div>

<!-- BETWEEN -->
<div id="between" class="screen" style="justify-content: center;">
  <h1>Team <span id="nextTeam">2</span></h1>
  <div class="card">
    <h2>Pass the phone 📱</h2>
    <button class="blue" onclick="nextTeam()">Start</button>
  </div>
</div>

<!-- END -->
<div id="end" class="screen" style="justify-content: center;">
  <h1>🏆 Game Over</h1>
  <div class="card">
    <h2 id="winner"></h2>
    <table id="results"></table>
    <button class="primary" onclick="location.reload()">Play Again</button>
  </div>
</div>

</div>

<script>
const cards = [
  /* 📖 BIBLE CHARACTERS */
  {e:"👨🍎🌳", a:"Adam", c:"bible"},
  {e:"👩🍎🐍", a:"Eve", c:"bible"},
  {e:"🌧️⛵🦒🦁", a:"Noah", c:"bible"},
  {e:"⭐👴🐪", a:"Abraham", c:"bible"},
  {e:"👦🔥🐏", a:"Isaac", c:"bible"},
  {e:"🌈👕💤🌾", a:"Joseph", c:"bible"},
  {e:"👶🧺🐊", a:"Moses", c:"bible"},
  {e:"💪🦁✂️", a:"Samson", c:"bible"},
  {e:"🌾👩❤️", a:"Ruth", c:"bible"},
  {e:"👑🎶❤️", a:"David", c:"bible"},
  {e:"👑👶🗡️", a:"Solomon", c:"bible"},
  {e:"🔥🐂🐦‍⬛🍞", a:"Elijah", c:"bible"},
  {e:"🌊🐋🙏", a:"Jonah", c:"bible"},
  {e:"🦁🙏", a:"Daniel", c:"bible"},
  {e:"👸✡️📜💍", a:"Esther", c:"bible"},
  {e:"🌊🕊️🩴🏕️🦗", a:"John the Baptist", c:"bible"},
  {e:"🪽🤱🌠🐑", a:"Jesus", c:"bible"},

  /* 🌿 FEASTS & EVENTS */
  {e:"🕎", a:"Hanukkah", c:"feasts"},
  {e:"🌿🩸🐑🚪", a:"Passover", c:"feasts"},
  {e:"🔥🕊️", a:"Pentecost", c:"feasts"},
  {e:"✝️🪦✨", a:"Resurrection", c:"feasts"},
  {e:"✝️🩸🌑", a:"Crucifixion", c:"feasts"},

  /* 😂 FUNNY SOUNDS */
  {e:"🌱✅", a:"Root Truth = Ruth", c:"funny"},
  {e:"🚫 AHH", a:"No Are = Noah", c:"funny"},
  {e:"✅🗣️", a:"Done Yell = Daniel", c:"funny"},
  {e:"Yester", a:"Esther", c:"funny"},
  {e:"🤵👰️", a:"Present Tense = Mary", c:"funny"},
  {e:"Luxurious", a:"Lazarus", c:"funny"},
  {e:"🐍S", a:"Starts with B = Boaz", c:"funny"},
  {e:"📊", a:"Poll = Paul", c:"funny"}
];

let teamCount = 2;
let team = 1;
let score = 0;
let time = 60;
let timer;
let used = [];
let scores = [];
let selectedCategory = "mixed";
let currentCard = null;

function startGame(){
  teamCount = parseInt(document.getElementById("teams").value);
  selectedCategory = document.getElementById("category").value;
  scores = Array(teamCount).fill(0);

  document.getElementById("start").classList.remove("show");
  document.getElementById("game").classList.add("show");

  startRound();
}

function getCards(){
  return selectedCategory === "mixed"
    ? cards
    : cards.filter(c => c.c === selectedCategory);
}

function startRound(){
  time = 60;
  score = 0;
  used = [];

  document.getElementById("team").innerText = team;

  nextCard();

  timer = setInterval(()=>{
    time--;
    document.getElementById("time").innerText = time;
    if(time <= 0) endRound();
  },1000);
}

function nextCard(){
  let pool = getCards();

  if(used.length === pool.length) used = [];

  let i;
  do {
    i = Math.floor(Math.random() * pool.length);
  } while(used.includes(i));

  used.push(i);

  currentCard = pool[i];

  document.getElementById("emoji").innerText = currentCard.e;
  document.getElementById("clue").innerText = "";
}

function revealAnswer(){
  if(!currentCard) return;

  document.getElementById("clue").innerText = " (" + currentCard.a + ")";
}

function correct(){
  score++;
  scores[team-1] = score;
  document.getElementById("score").innerText = score;
  nextCard();
}

function skip(){
  nextCard();
}

function endGame(){
  clearInterval(timer);
  showResults();
}

function endRound(){
  clearInterval(timer);

  if(team < teamCount){
    team++;
    document.getElementById("nextTeam").innerText = team;
    document.getElementById("game").classList.remove("show");
    document.getElementById("between").classList.add("show");
  } else {
    showResults();
  }
}

function nextTeam(){
  document.getElementById("between").classList.remove("show");
  document.getElementById("game").classList.add("show");
  startRound();
}

function showResults(){
  document.getElementById("game").classList.remove("show");
  document.getElementById("between").classList.remove("show");
  document.getElementById("end").classList.add("show");

  let table = "";
  let max = 0;
  let winner = 1;

  scores.forEach((s,i)=>{
    if(s > max){
      max = s;
      winner = i+1;
    }
    table += `<tr><td>Team ${i+1}</td><td>${s}</td></tr>`;
  });

  document.getElementById("results").innerHTML = table;
  document.getElementById("winner").innerText = "Team " + winner + " Wins 🎉";
}
</script>
</body>
</html>
